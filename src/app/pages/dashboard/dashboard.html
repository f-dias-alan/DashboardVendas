<div class="dashboard-container">

  <div class="dashboard-header">

    <h1>
      Dashboard de Vendas
    </h1>

    <p>
      Gerencie seus produtos
    </p>

  </div>

  <app-product-card [produtos]="produtos()" />

  <app-product-form [produtoEdicao]="produtoEmEdicao()" (save)="addProduto($event)" />

  @if(produtos().length === 0) {

  <p class="empty-state">

    Nenhum produto cadastrado

  </p>

  } @else {

  <app-product-table [produtos]="produtos()" (delete)="deleteProduto($event)" (edit)="editProduto($event)" />

  }

</div>
