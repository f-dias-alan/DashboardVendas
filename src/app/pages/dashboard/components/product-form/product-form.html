<mat-card class="form-card">

  <form
    [formGroup]="form"
    (ngSubmit)="submit()"
  >

    <h2>
      Novo Produto
    </h2>

    <div class="form-grid">

      <mat-form-field appearance="outline">

        <mat-label>
          Nome
        </mat-label>

        <input
          matInput
          formControlName="nome"
        />

      </mat-form-field>

      <mat-form-field appearance="outline">

        <mat-label>
          Preço
        </mat-label>

        <input
          matInput
          type="number"
          formControlName="preco"
        />

      </mat-form-field>

      <mat-form-field appearance="outline">

        <mat-label>
          Validade
        </mat-label>

        <input
          matInput
          type="date"
          formControlName="validade"
        />

      </mat-form-field>

      <mat-form-field appearance="outline">

        <mat-label>
          Estoque
        </mat-label>

        <input
          matInput
          type="number"
          formControlName="estoque"
        />

      </mat-form-field>

      <div class="upload-area">

        <input

          #fileInput

          type="file"

          accept=".png,.jpg,.jpeg"

          (change)="onFileSelected($event)"

          hidden
        />

        <button
          mat-raised-button
          color="primary"
          type="button"
          (click)="fileInput.click()"
        >

          Selecionar imagem

        </button>

      </div>

      <button
        mat-raised-button
        color="primary"
        type="submit"
      >

        Salvar Produto

      </button>

    </div>

    @if(imagemPreview()) {

      <div class="preview">

        <img

          [src]="imagemPreview()"

          alt="Preview"

        />

      </div>

    }

  </form>

</mat-card>
