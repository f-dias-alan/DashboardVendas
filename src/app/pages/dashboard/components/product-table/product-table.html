<mat-card class="table-card">

  <table
    mat-table
    [dataSource]="produtos()"
  >

    <ng-container matColumnDef="imagem">

      <th mat-header-cell *matHeaderCellDef>
        Imagem
      </th>

      <td mat-cell *matCellDef="let produto">

        <img
          [src]="produto.imagem"
          alt="Produto"
          class="product-image"
        />

      </td>

    </ng-container>

    <ng-container matColumnDef="nome">

      <th mat-header-cell *matHeaderCellDef>
        Produto
      </th>

      <td mat-cell *matCellDef="let produto">
        {{ produto.nome }}
      </td>

    </ng-container>

    <ng-container matColumnDef="preco">

      <th mat-header-cell *matHeaderCellDef>
        Preço
      </th>

      <td mat-cell *matCellDef="let produto">

        {{ produto.preco | currency:'BRL' }}

      </td>

    </ng-container>

    <ng-container matColumnDef="validade">

      <th mat-header-cell *matHeaderCellDef>
        Validade
      </th>

      <td mat-cell *matCellDef="let produto">

        {{ produto.validade }}

      </td>

    </ng-container>

    <ng-container matColumnDef="estoque">

      <th mat-header-cell *matHeaderCellDef>
        Estoque
      </th>

      <td mat-cell *matCellDef="let produto">

        {{ produto.estoque }}

      </td>

    </ng-container>

    <ng-container matColumnDef="status">

      <th mat-header-cell *matHeaderCellDef>
        Status
      </th>

      <td mat-cell *matCellDef="let produto">

        <mat-chip
          [class.success]="produto.status === 'Em estoque'"
          [class.warning]="produto.status === 'Baixo estoque'"
          [class.danger]="produto.status === 'Sem estoque'"
        >
          {{ produto.status }}
        </mat-chip>

      </td>

    </ng-container>

    <ng-container matColumnDef="acoes">

      <th mat-header-cell *matHeaderCellDef>
        Ações
      </th>

      <td mat-cell *matCellDef="let produto">

        <button
          mat-icon-button
          color="primary"
          (click)="editar(produto)"
        >

          <mat-icon>
            edit
          </mat-icon>

        </button>

        <button
          mat-icon-button
          color="warn"
          (click)="remove(produto.id)"
        >

          <mat-icon>
            delete
          </mat-icon>

        </button>

      </td>

    </ng-container>

    <tr
      mat-header-row
      *matHeaderRowDef="displayedColumns"
    ></tr>

    <tr
      mat-row
      *matRowDef="
        let row;
        columns: displayedColumns
      "
    ></tr>

  </table>

</mat-card>
