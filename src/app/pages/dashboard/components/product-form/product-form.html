<mat-card class="form-card">

  <h2>Novo Produto</h2>

  <form
    [formGroup]="form"
    (ngSubmit)="submit()"
  >

    <mat-form-field appearance="outline">

      <mat-label>Nome</mat-label>

      <input
        matInput
        formControlName="nome"
      />

    </mat-form-field>

    <mat-form-field appearance="outline">

      <mat-label>Preço</mat-label>

      <input
        matInput
        type="number"
        formControlName="preco"
      />

    </mat-form-field>

    <mat-form-field appearance="outline">

      <mat-label>Validade</mat-label>

      <input
        matInput
        type="date"
        formControlName="validade"
      />

    </mat-form-field>

    <mat-form-field appearance="outline">

      <mat-label>Estoque</mat-label>

      <input
        matInput
        type="number"
        formControlName="estoque"
      />

    </mat-form-field>

    <div class="upload-container">

      <label>
        Selecionar imagem

        <input
          type="file"
          accept=".png,.jpg,.jpeg"
          (change)="onFileSelected($event)"
          hidden
        />
      </label>

    </div>

    <div
      class="preview"
      *ngIf="imagemPreview"
    >

      <img
        [src]="imagemPreview"
        alt="Preview"
      />

    </div>

    <button
      mat-raised-button
      color="primary"
      type="submit"
    >

      Salvar Produto

    </button>

  </form>

</mat-card>
